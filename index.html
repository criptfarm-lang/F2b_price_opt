<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прайс-лист — Fish to Business</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐟</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:       #1a2744;
  --navy-mid:   #253460;
  --navy-light: #e8ecf5;
  --orange:     #F26522;
  --orange-hover: #d95510;
  --orange-light: #fff0e8;
  --white:      #ffffff;
  --bg:         #f5f6f8;
  --bg-card:    #f0f2f7;
  --text:       #1a2744;
  --text-mid:   #4a5568;
  --text-muted: #8898aa;
  --border:     #e2e6f0;
  --radius:     14px;
  --radius-sm:  8px;
  --shadow-sm:  0 2px 8px rgba(26,39,68,.07);
  --shadow-md:  0 6px 24px rgba(26,39,68,.11);
  --shadow-lg:  0 16px 48px rgba(26,39,68,.14);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Golos Text', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* ─── TOP BAR ─── */
.topbar {
  background: var(--navy);
  color: rgba(255,255,255,.7);
  font-size: 12.5px;
  padding: 0 40px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar-left { display: flex; align-items: center; gap: 20px; }
.topbar-left svg { opacity: .6; }
.topbar-phone { color: #fff; font-weight: 600; font-size: 13px; letter-spacing: .01em; }
.topbar-hours { opacity: .6; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.topbar-link {
  color: rgba(255,255,255,.65);
  text-decoration: none;
  font-size: 12px;
  transition: color .18s;
}
.topbar-link:hover { color: #fff; }

/* ─── HEADER ─── */
header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: var(--shadow-sm);
}
.header-inner {
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 40px;
  height: 70px;
  display: flex;
  align-items: center;
  gap: 32px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
.logo-icon {
  width: 42px; height: 42px;
  background: var(--navy);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.logo-text {}
.logo-title {
  font-size: 14px;
  font-weight: 900;
  color: var(--navy);
  letter-spacing: .04em;
  text-transform: uppercase;
  line-height: 1.1;
}
.logo-sub {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: .02em;
}

.header-search {
  flex: 1;
  position: relative;
  max-width: 480px;
}
.header-search input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: 10px 18px 10px 44px;
  font-family: 'Golos Text', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.header-search input:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 3px rgba(242,101,34,.1);
}
.header-search input::placeholder { color: var(--text-muted); }
.search-icon {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.btn-pdf {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  background: var(--orange);
  color: #fff;
  border: none;
  border-radius: 50px;
  font-family: 'Golos Text', sans-serif;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  transition: background .18s, transform .15s, box-shadow .18s;
  white-space: nowrap;
  box-shadow: 0 4px 14px rgba(242,101,34,.35);
}
.btn-pdf:hover {
  background: var(--orange-hover);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(242,101,34,.4);
}

.update-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--navy-light);
  border-radius: 50px;
  font-size: 12px;
  color: var(--navy-mid);
  font-weight: 500;
}
.pulse-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #22c55e;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ─── HERO BANNER ─── */
.hero {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}
.hero-inner {
  max-width: 1240px;
  margin: 0 auto;
  padding: 18px 40px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}
.hero-text { display:flex; align-items:center; gap:24px; flex-wrap:wrap; }
.hero-eyebrow { display:none; }
.hero-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.2;
  letter-spacing: -.01em;
  margin-bottom: 0;
}
.hero-title span { color: var(--orange); }
.hero-title br { display:none; }
.hero-desc {
  font-size: 13px;
  color: var(--text-muted);
  max-width: 320px;
  line-height: 1.4;
}
.hero-stats {
  display: flex;
  gap: 20px;
}
.hero-stat {}
.hero-stat-num {
  font-size: 16px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1;
}
.hero-stat-num span { color: var(--orange); }
.hero-stat-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 1px;
}

.hero-date {
  flex-shrink: 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  text-align: right;
  white-space: nowrap;
}
.hero-date-label { font-size: 10px; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 2px; }
.hero-date-val { font-size: 13px; font-weight: 600; color: var(--navy); }

/* ─── CATEGORY NAV ─── */
.cat-nav-wrap {
  background: var(--white);
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 70px;
  z-index: 100;
}
.cat-nav-inner {
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 40px;
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.cat-nav-inner::-webkit-scrollbar { display: none; }

.cat-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  font-family: 'Golos Text', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: color .18s, border-color .18s;
  margin-bottom: -2px;
  letter-spacing: .01em;
}
.cat-tab:hover { color: var(--navy); }
.cat-tab.active {
  color: var(--orange);
  border-bottom-color: var(--orange);
}
.cat-count {
  background: var(--bg-card);
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: 50px;
}
.cat-tab.active .cat-count {
  background: var(--orange-light);
  color: var(--orange);
}

/* ─── MAIN ─── */
main {
  max-width: 1240px;
  margin: 0 auto;
  padding: 20px 40px 40px;
}

/* ─── SECTION ─── */
.cat-section { margin-bottom: 28px; }
.cat-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
}
.cat-section-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: .04em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cat-section-title::before {
  content: '';
  display: block;
  width: 3px;
  height: 16px;
  background: var(--orange);
  border-radius: 2px;
}
.cat-section-count {
  font-size: 11.5px;
  color: var(--text-muted);
  font-weight: 500;
}

/* ─── PRODUCT LIST (строчный) ─── */
.product-grid {
  display: flex;
  flex-direction: column;
  gap: 0;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--white);
}

/* ─── СТРОКА ТОВАРА ─── */
.product-card {
  display: grid;
  grid-template-columns: 40px 1fr auto auto;
  align-items: center;
  gap: 0;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
  position: relative;
  min-height: 40px;
  overflow: visible;
}
.product-card:last-child { border-bottom: none; }
.product-card:hover { background: var(--bg); }

/* Миниатюра с превью */
.p-thumb-wrap {
  width: 40px; height: 40px;
  position: relative;
  flex-shrink: 0;
  overflow: visible;
}
.p-thumb-mini {
  width: 40px; height: 40px;
  object-fit: cover;
  display: block;
  cursor: zoom-in;
}
.p-thumb-placeholder {
  width: 40px; height: 40px;
  background: var(--bg-card);
  display: flex; align-items: center; justify-content: center;
}

/* Hover-превью — фиксированный блок справа от миниатюры */
.p-thumb-wrap:hover .p-preview {
  opacity: 1;
  pointer-events: none;
  transform: translateY(-50%) scale(1);
}
.p-preview {
  position: fixed;
  left: 80px;
  top: 50%;
  transform: translateY(-50%) scale(0.94);
  width: 280px;
  height: 210px;
  object-fit: cover;
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(26,39,68,.25), 0 2px 8px rgba(26,39,68,.15);
  border: 3px solid var(--white);
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity .18s ease, transform .18s ease;
}

/* Название и описание */
.p-info {
  padding: 7px 12px;
  min-width: 0;
}
.product-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--navy);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.product-desc {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.3;
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Артикул */
.p-code {
  padding: 0 12px;
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  min-width: 70px;
  text-align: right;
}

/* Цена */
.p-price-wrap {
  padding: 0 16px 0 8px;
  text-align: right;
  white-space: nowrap;
  min-width: 100px;
}
.price-val {
  font-size: 14px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1;
}
.price-val .cur { font-size: 12px; font-weight: 700; }
.price-unit {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
}
.price-na {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
}

/* Шапка таблицы */
.product-grid-header {
  display: grid;
  grid-template-columns: 40px 1fr auto auto;
  gap: 0;
  padding: 6px 0;
  background: var(--bg);
  border-bottom: 1.5px solid var(--border);
  border-radius: var(--radius) var(--radius) 0 0;
}
.product-grid-header span {
  font-size: 10px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  color: var(--text-muted);
}
.product-grid-header .h-name  { padding-left: 12px; }
.product-grid-header .h-code  { padding-right: 12px; text-align: right; min-width: 70px; }
.product-grid-header .h-price { padding-right: 16px; text-align: right; min-width: 100px; }

/* PDF — скрываем фото, оптимизируем под печать */
@media print {
  .p-thumb-wrap, .p-preview { display: none !important; }
  .product-card {
    grid-template-columns: 1fr auto auto !important;
    min-height: 36px !important;
    break-inside: avoid;
  }
  .product-grid-header {
    grid-template-columns: 1fr auto auto !important;
  }
  .product-grid-header span:first-child { display: none !important; }
  .product-name { font-size: 12px !important; white-space: normal !important; }
  .product-desc { font-size: 11px !important; }
  .p-info { padding: 6px 12px !important; }
  .p-code { font-size: 11px !important; padding-right: 12px !important; }
  .p-price-wrap { padding-right: 0 !important; padding-left: 12px !important; }
  .price-val { font-size: 13px !important; }
  .cat-section { margin-bottom: 24px !important; }
  .cat-section-title { font-size: 14px !important; }
}

/* ─── SKELETONS ─── */
.skeleton {
  background: linear-gradient(90deg,var(--bg-card) 25%,var(--border) 50%,var(--bg-card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skel-card { background:var(--white); border:1.5px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.skel-body { padding:12px 16px; display:flex; align-items:center; gap:12px; }
.skel-thumb { width:48px; height:48px; flex-shrink:0; }
.skel-title { height:14px; width:50%; }
.skel-price { height:14px; width:15%; margin-left:auto; }

/* ─── EMPTY ─── */
.empty-state {
  grid-column:1/-1; padding:60px 20px;
  text-align:center; color:var(--text-muted);
}
.empty-state svg { opacity:.25; margin-bottom:12px; }

/* ─── FOOTER ─── */
footer {
  background: var(--navy);
  color: rgba(255,255,255,.6);
}
.footer-top {
  max-width:1240px; margin:0 auto;
  padding:40px 40px 32px;
  display:flex; flex-wrap:wrap; gap:40px;
  align-items:flex-start;
  border-bottom:1px solid rgba(255,255,255,.1);
}
.footer-brand {}
.footer-logo-title {
  font-size:15px; font-weight:900; color:#fff;
  letter-spacing:.04em; text-transform:uppercase;
  margin-bottom:2px;
}
.footer-logo-sub { font-size:11.5px; color:rgba(255,255,255,.4); }
.footer-tagline {
  font-size:13px; color:rgba(255,255,255,.5);
  margin-top:10px; max-width:220px; line-height:1.5;
}

.footer-links-group { flex:1; }
.footer-links-title {
  font-size:11px; letter-spacing:.08em; text-transform:uppercase;
  color:rgba(255,255,255,.3); font-weight:700;
  margin-bottom:14px;
}
.footer-links { display:flex; flex-direction:column; gap:9px; }
.footer-link {
  display:flex; align-items:center; gap:9px;
  color:rgba(255,255,255,.65); text-decoration:none;
  font-size:14px; font-weight:500;
  transition:color .18s;
}
.footer-link:hover { color:#fff; }
.footer-link .fl-icon {
  width:32px; height:32px; border-radius:8px;
  background:rgba(255,255,255,.08);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background .18s;
}
.footer-link:hover .fl-icon { background:var(--orange); }

.footer-bottom {
  max-width:1240px; margin:0 auto;
  padding:16px 40px;
  display:flex; align-items:center; justify-content:space-between;
  font-size:12px; color:rgba(255,255,255,.3);
}

/* ─── RESPONSIVE ─── */
@media(max-width:768px){
  /* Topbar — скрываем часы, оставляем телефон */
  .topbar { padding:0 12px; height:auto; min-height:36px; flex-wrap:wrap; }
  .topbar-left { gap:8px; flex-wrap:wrap; }
  .topbar-hours { display:none; }

  /* Header */
  .header-search, .update-pill { display:none; }
  .header-inner { padding:0 12px; height:56px; gap:12px; }
  .logo-title { font-size:12px; }
  .logo-sub { font-size:10px; }
  .logo-icon { width:34px; height:34px; }
  .btn-pdf { padding:8px 14px; font-size:12px; }
  .btn-pdf svg { display:none; }

  /* Hero — компактный */
  .hero-inner { padding:12px 16px 10px; flex-direction:row; flex-wrap:wrap; gap:8px; }
  .hero-title { font-size:15px; }
  .hero-title br { display:none; }
  .hero-desc { display:none; }
  .hero-stats { gap:12px; }
  .hero-stat-num { font-size:14px; }
  .hero-date { display:none; }

  /* Nav */
  .cat-nav-inner { padding:0 12px; }
  .cat-tab { padding:10px 12px; font-size:12px; }

  /* Main */
  main { padding:16px 12px 40px; }

  /* Product list */
  .product-grid { border-radius:8px; }
  .product-card { grid-template-columns:36px 1fr auto; }
  .p-thumb-wrap { width:36px; height:36px; }
  .p-thumb-mini { width:36px; height:36px; }
  .p-thumb-placeholder { width:36px; height:36px; }
  .p-info { padding:6px 10px; }
  .product-name { font-size:12px; }
  .product-desc { font-size:10px; }
  .p-code { display:none; }
  .p-price-wrap { padding:0 12px 0 4px; min-width:80px; }
  .price-val { font-size:13px; }
  .price-unit { font-size:10px; }
  .product-grid-header { grid-template-columns:36px 1fr auto; }
  .product-grid-header .h-code { display:none; }
  .product-grid-header .h-price { min-width:80px; padding-right:12px; }

  /* Section */
  .cat-section { margin-bottom:20px; }
  .cat-section-title { font-size:13px; }

  /* Footer */
  .footer-top { padding:20px 16px; flex-direction:column; gap:16px; }
  .footer-bottom { padding:12px 16px; flex-direction:column; gap:4px; text-align:center; }
}

@media(max-width:400px){
  .logo-title { font-size:11px; }
  .btn-pdf { padding:7px 12px; font-size:11px; }
  .topbar-phone { font-size:11px; }
}

@media print {
  .topbar,.cat-nav-wrap,header,.carousel-btn,.carousel-dots { display:none!important; }
  .product-card { break-inside:avoid; box-shadow:none; border:1px solid #ddd; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    <span>Москва</span>
    <span class="topbar-phone" id="tbPhone">8-800-700-27-03</span>
    <span class="topbar-hours" id="tbHours">По будням с 9:00 до 18:00</span>
  </div>
  <div class="topbar-right"></div>
</div>

<!-- HEADER -->
<header>
  <div class="header-inner">

<script>
const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';
let allData = null;

async function loadPriceList() {
  try {
    const res = await fetch(`${API_BASE}/api/pricelist`);
    if (!res.ok) throw new Error();
    allData = await res.json();
    render(allData);
  } catch {
    document.getElementById('loadingState').innerHTML = `
      <div class="empty-state">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p style="font-size:15px;font-weight:600;color:var(--navy);margin-bottom:6px;">Не удалось загрузить прайс</p>
        <p style="font-size:13px;">Попробуйте обновить страницу</p>
      </div>`;
  }
}

function render(data) {
  // Company info
  const c = data.company || {};
  if (c.name) {
    document.getElementById('logoTitle').textContent = c.name;
    document.getElementById('footerTitle').textContent = c.name.toUpperCase();
    document.getElementById('footerCopy').textContent = `© ${new Date().getFullYear()} ${c.name}`;
  }
  if (c.tagline) document.getElementById('footerTagline').textContent = c.tagline;
  else document.getElementById('footerTagline').style.display = 'none';
  if (c.heroDesc) document.getElementById('heroDesc').textContent = c.heroDesc;

  // Dates
  const now = new Date();
  document.getElementById('priceDate').textContent = now.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('updateDate').textContent = now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('updateTime').textContent = 'Обновлено ' + now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});

  // Stats
  const cats = data.categories || [];
  const totalProducts = cats.reduce((s,c)=>s+(c.products?.length||0),0);
  if (totalProducts > 0) {
    document.getElementById('heroStats').innerHTML = `
      <div class="hero-stat"><div class="hero-stat-num">${cats.length}<span>+</span></div><div class="hero-stat-label">категорий</div></div>
      <div class="hero-stat"><div class="hero-stat-num">${totalProducts}<span>+</span></div><div class="hero-stat-label">позиций</div></div>`;
  }

  // Footer links
  const iconSVG = {
    website: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
    order:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>`,
    phone:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.81 19.79 19.79 0 01.01 2.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>`,
    whatsapp:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>`,
  };
  const fl = document.getElementById('footerLinks');
  (data.links||[]).forEach(link => {
    fl.insertAdjacentHTML('beforeend',`
      <a href="${link.url}" class="footer-link" ${link.type==='phone'?'':'target="_blank"'}>
        <span class="fl-icon">${iconSVG[link.type]||iconSVG.website}</span>
        ${link.label}
      </a>`);
  });

  // Nav + content
  const nav = document.getElementById('catNav');
  const content = document.getElementById('priceContent');
  content.innerHTML = '';

  if (!cats.length) {
    content.innerHTML = `<div class="empty-state"><p style="font-size:15px;font-weight:600;">Прайс ещё не настроен</p><p style="font-size:13px;margin-top:4px;">Откройте <a href="admin.html" style="color:var(--orange)">админку</a> и добавьте категории</p></div>`;
    return;
  }

  cats.forEach((cat, i) => {
    const id = `cat-${i}`;
    // Tab
    const tab = document.createElement('button');
    tab.className = 'cat-tab' + (i===0?' active':'');
    tab.dataset.target = id;
    tab.innerHTML = `${cat.name} <span class="cat-count">${cat.products?.length||0}</span>`;
    tab.onclick = () => {
      document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'});
    };
    nav.appendChild(tab);

    // Section
    const sec = document.createElement('section');
    sec.className = 'cat-section';
    sec.id = id;
    sec.innerHTML = `
      <div class="cat-section-header">
        <h2 class="cat-section-title">${cat.name}</h2>
        <span class="cat-section-count">${cat.products?.length||0} позиций</span>
      </div>
      <div class="product-grid" id="grid-${i}"></div>`;
    content.appendChild(sec);

    const grid = document.getElementById(`grid-${i}`);
    if (!cat.products?.length) {
      grid.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px;">Нет товаров в категории</div>`;
    } else {
      // Header row
      const hdr = document.createElement('div');
      hdr.className = 'product-grid-header';
      hdr.innerHTML = `<span></span><span class="h-name">Наименование</span><span class="h-code">Артикул</span><span class="h-price">Цена опт</span>`;
      grid.appendChild(hdr);
      // Rows
      cat.products.forEach((p, pi) => {
        const card = makeCard(p);
        // Для последних 3 строк превью показываем вверх
        if (pi >= cat.products.length - 3) card.querySelector('.p-thumb-wrap')?.classList.add('preview-up');
        grid.appendChild(card);
      });
    }
  });

  setupScrollSpy();
}

function makeCard(p) {
  const card = document.createElement('div');
  card.className = 'product-card';
  const imgs = p.images||[];
  const firstImg = imgs[0] || null;

  card.innerHTML = `
    <div class="p-thumb-wrap">
      ${firstImg
        ? `<img class="p-thumb-mini" src="${firstImg}" alt="${p.name}" loading="lazy">
           <img class="p-preview" src="${firstImg}" alt="${p.name}" loading="lazy">`
        : `<div class="p-thumb-placeholder">
             <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
           </div>`}
    </div>
    <div class="p-info">
      <div class="product-name">${p.name}</div>
      ${p.description ? `<div class="product-desc">${p.description}</div>` : ''}
    </div>
    <div class="p-code">${p.code||''}</div>
    <div class="p-price-wrap">
      ${p.price!=null
        ? `<div class="price-val">${fmtPrice(p.price)} <span class="cur">₽</span><span class="price-unit">${p.unit?' / '+p.unit:''}</span></div>`
        : `<div class="price-na">По запросу</div>`}
    </div>`;
  return card;
}

function fmtPrice(v) {
  if (!v && v!==0) return '—';
  return Number(v).toLocaleString('ru-RU');
}


function setupScrollSpy() {
  const secs = document.querySelectorAll('.cat-section');
  const tabs = document.querySelectorAll('.cat-tab');
  new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting) tabs.forEach(t=>t.classList.toggle('active',t.dataset.target===e.target.id));
    });
  },{rootMargin:'-30% 0px -65% 0px'}).observe;
  // Simple version
  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting)tabs.forEach(t=>t.classList.toggle('active',t.dataset.target===e.target.id));});
  },{rootMargin:'-30% 0px -65% 0px'});
  secs.forEach(s=>io.observe(s));
}

function filterProducts(q) {
  const query = q.toLowerCase().trim();
  document.querySelectorAll('.product-card').forEach(card => {
    const name = card.querySelector('.product-name')?.textContent.toLowerCase()||'';
    const desc = card.querySelector('.product-desc')?.textContent.toLowerCase()||'';
    card.style.display = (!query||name.includes(query)||desc.includes(query)) ? '' : 'none';
  });
}

async function downloadPDF() {
  window.open('/api/pdf', '_blank');
}

loadPriceList();

// Позиционируем превью рядом с курсором
document.addEventListener('mousemove', e => {
  document.querySelectorAll('.p-preview').forEach(el => {
    const wrap = el.closest('.p-thumb-wrap');
    if (!wrap) return;
    const rect = wrap.getBoundingClientRect();
    // Показываем превью справа от миниатюры, по вертикали — у курсора
    let top = e.clientY;
    const previewH = 210;
    // Не выходить за нижний край экрана
    if (top + previewH/2 > window.innerHeight - 20) top = window.innerHeight - 20 - previewH/2;
    if (top - previewH/2 < 20) top = 20 + previewH/2;
    el.style.top = top + 'px';
    el.style.left = (rect.right + 12) + 'px';
    // Если не влезает справа — показываем слева
    if (rect.right + 12 + 280 > window.innerWidth - 10) {
      el.style.left = (rect.left - 280 - 12) + 'px';
    }
  });
});
</script>
