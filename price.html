<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прайс-лист — Fish to Business</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:   #1a2744;
  --orange: #F26522;
  --white:  #ffffff;
  --bg:     #f7f8fb;
  --border: #e2e6f0;
  --text:   #1a2744;
  --muted:  #8898aa;
}
body {
  font-family: 'Golos Text', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 12px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
.header {
  background: var(--navy);
  padding: 10px 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
  border-bottom: 2px solid var(--orange);
  position: sticky; top: 0; z-index: 100;
}
.logo-title { font-size: 14px; font-weight: 900; color: #fff; letter-spacing: .06em; text-transform: uppercase; line-height: 1; }
.logo-sub   { font-size: 10px; color: rgba(255,255,255,.4); margin-top: 2px; }
.hdr-mid { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; }
.hc { color: rgba(255,255,255,.6); font-size: 11px; display: flex; align-items: center; gap: 5px; }
.hc strong { color: #fff; font-weight: 700; }
.btn-pdf {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--orange); color: #fff; border: none; border-radius: 50px;
  padding: 7px 16px; font-family: 'Golos Text', sans-serif;
  font-size: 11.5px; font-weight: 700; cursor: pointer; transition: background .15s; white-space: nowrap;
}
.btn-pdf:hover { background: #d95510; }

/* DATE */
.datebar {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 4px 24px; font-size: 10px; color: var(--muted);
  display: flex; align-items: center; gap: 5px;
}
.datebar svg { color: var(--orange); }

/* CONTENT */
.content { padding: 12px 24px 40px; max-width: 980px; margin: 0 auto; }

/* CATEGORY */
.category { margin-bottom: 14px; }
.cat-title {
  font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--navy); padding-bottom: 5px;
  display: flex; align-items: center; gap: 8px;
}
.cat-title::after { content:''; flex:1; height:1px; background: linear-gradient(to right, var(--border), transparent); }

/* TABLE */
.ptable { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 7px; overflow: hidden; border: 1px solid var(--border); }
.ptable thead th {
  background: var(--navy); color: rgba(255,255,255,.5);
  font-size: 9px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
  padding: 5px 12px; text-align: left;
}
.ptable thead th.r { text-align: right; }
.ptable tbody tr { border-bottom: 1px solid var(--border); }
.ptable tbody tr:last-child { border-bottom: none; }
.ptable tbody tr:hover { background: #fff8f5; }
.ptable td { padding: 5px 12px; vertical-align: middle; }
.p-name { font-weight: 600; color: var(--navy); font-size: 12px; }
.p-code { font-size: 9.5px; color: var(--muted); font-family: monospace; }
.p-desc { color: var(--muted); font-size: 11px; }
.p-unit { color: var(--muted); font-size: 11px; }
.p-price { font-size: 12.5px; font-weight: 600; color: var(--navy); text-align: right; white-space: nowrap; }
.p-price .rub { color: var(--orange); }
.p-noprice { font-size: 11px; color: var(--muted); text-align: right; }

/* FOOTER */
.footer { background: var(--navy); padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.footer-info { color: rgba(255,255,255,.5); font-size: 10.5px; }
.footer-info strong { color: rgba(255,255,255,.75); }
.footer-links { display: flex; gap: 14px; flex-wrap: wrap; }
.footer-link { color: rgba(255,255,255,.45); font-size: 10.5px; text-decoration: none; transition: color .15s; }
.footer-link:hover { color: var(--orange); }

/* LOADING */
.loading { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 13px; }
.dot { display:inline-block; width:7px; height:7px; background:var(--orange); border-radius:50%; margin:0 2px; animation:b .8s ease infinite; }
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes b{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}

/* PRINT */
@media print {
  .btn-pdf { display: none !important; }
  .header { position: static; }
  body { background: #fff; font-size: 10px; }
  .content { padding: 6px 0 0; }
  .ptable { box-shadow: none; }
  .ptable tbody tr:hover { background: transparent; }
  .category { break-inside: avoid; margin-bottom: 8px; }
  .footer { display: none; }
  .ptable td, .ptable thead th { padding: 3px 10px; }
  .p-name { font-size: 10px; }
  .p-price { font-size: 10px; }
}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="logo-title">Fish to Business</div>
    <div class="logo-sub">рыба для бизнеса</div>
  </div>
  <div class="hdr-mid">
    <div class="hc">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01.06 1.22 2 2 0 012.03 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/></svg>
      <strong id="hdrPhone">8-800-700-27-03</strong>
    </div>
    <div class="hc">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="hdrAddress">Московская обл., Раменский р-н, п. Ильинский, ул. Пролетарская, д. 49</span>
    </div>
    <div class="hc" id="hdrHours"></div>
  </div>
  <button class="btn-pdf" onclick="window.print()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Сохранить PDF
  </button>
</header>

<div class="datebar">
  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
  <span id="dateText"></span>
</div>

<div class="content" id="content">
  <div class="loading">
    <div style="margin-bottom:12px">Загружаем прайс</div>
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>
</div>

<footer class="footer" id="footer" style="display:none">
  <div class="footer-info" id="footerInfo"></div>
  <div class="footer-links" id="footerLinks"></div>
</footer>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';

async function load() {
  try {
    const r = await fetch(`${API}/api/pricelist`);
    if (!r.ok) throw new Error();
    render(await r.json());
  } catch {
    document.getElementById('content').innerHTML =
      '<div class="loading" style="color:#e53e3e">Не удалось загрузить прайс</div>';
  }
}

function fmt(p) {
  return Number(p).toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function render(data) {
  const c    = data.company || {};
  const cats = (data.categories || []).filter(cat => cat.products?.length);

  if (c.phone)   document.getElementById('hdrPhone').textContent   = c.phone;
  if (c.address) document.getElementById('hdrAddress').textContent = c.address;
  if (c.hours)   document.getElementById('hdrHours').innerHTML =
    `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${c.hours}`;

  const now = new Date();
  document.getElementById('dateText').textContent =
    `Актуально на ${now.toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' })}`;

  const content = document.getElementById('content');
  if (!cats.length) {
    content.innerHTML = '<div class="loading">Прайс пока не заполнен</div>';
    return;
  }

  content.innerHTML = cats.map(cat => `
    <div class="category">
      <div class="cat-title">${cat.name || 'Без названия'}</div>
      <table class="ptable">
        <thead><tr>
          <th style="width:38%">Наименование</th>
          <th style="width:32%">Артикул</th>
          <th style="width:8%">Ед.</th>
          <th class="r" style="width:12%">Цена, ₽</th>
        </tr></thead>
        <tbody>${cat.products.map(p => `
          <tr>
            <td>
              <div class="p-name">${p.name}</div>
              ${p.code ? `<div class="p-code">${p.code}</div>` : ''}
            </td>
            <td><span class="p-code" style="font-family:monospace;font-size:11px;color:var(--muted)">${p.code || '—'}</span></td>
            <td><span class="p-unit">${p.unit || 'кг'}</span></td>
            <td>${p.price > 0
              ? `<div class="p-price">${fmt(p.price)} <span class="rub">₽</span></div>`
              : `<div class="p-noprice">по запросу</div>`
            }</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`).join('');

  const links = data.links || [];
  if (c.address || c.phone || links.length) {
    document.getElementById('footer').style.display = 'flex';
    const parts = [];
    if (c.phone)   parts.push(`<strong>${c.phone}</strong>`);
    if (c.address) parts.push(c.address);
    document.getElementById('footerInfo').innerHTML = parts.join(' · ');
    document.getElementById('footerLinks').innerHTML = links.map(l =>
      `<a class="footer-link" href="${l.url}" target="_blank">${l.label}</a>`
    ).join('');
  }
}

load();
</script>
</body>
</html>
