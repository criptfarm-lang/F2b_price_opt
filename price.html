<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прайс-лист — Fish to Business</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:       #1a2744;
  --navy-mid:   #253460;
  --orange:     #F26522;
  --orange-h:   #d95510;
  --orange-bg:  #fff5f0;
  --white:      #ffffff;
  --bg:         #f7f8fb;
  --border:     #e2e6f0;
  --text:       #1a2744;
  --text-mid:   #4a5568;
  --text-muted: #8898aa;
  --radius:     10px;
  --shadow:     0 2px 16px rgba(26,39,68,.08);
}
body {
  font-family: 'Golos Text', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: var(--navy);
  padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-title {
  font-size: 15px; font-weight: 900;
  color: #fff; letter-spacing: .06em; text-transform: uppercase;
}
.logo-sub { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.header-contact { color: rgba(255,255,255,.6); font-size: 12.5px; }
.header-contact strong { color: #fff; }
.btn-pdf {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--orange); color: #fff;
  border: none; border-radius: 50px;
  padding: 8px 18px; font-family: 'Golos Text', sans-serif;
  font-size: 12.5px; font-weight: 700; cursor: pointer;
  letter-spacing: .02em; transition: all .18s;
  box-shadow: 0 3px 12px rgba(242,101,34,.35);
}
.btn-pdf:hover { background: var(--orange-h); transform: translateY(-1px); }
.btn-pdf svg { flex-shrink: 0; }

/* ── HERO STRIP ── */
.hero {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 20px 32px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 24px; flex-wrap: wrap;
  border-bottom: 3px solid var(--orange);
}
.hero-text { color: rgba(255,255,255,.7); font-size: 12.5px; max-width: 600px; }
.hero-meta { display: flex; gap: 24px; flex-wrap: wrap; }
.hero-stat { text-align: center; }
.hero-stat .val { font-size: 22px; font-weight: 900; color: var(--orange); line-height: 1; }
.hero-stat .lbl { font-size: 10.5px; color: rgba(255,255,255,.45); text-transform: uppercase; letter-spacing: .07em; margin-top: 2px; }

/* ── CONTENT ── */
.content { padding: 24px 32px 60px; max-width: 960px; margin: 0 auto; }

/* ── CATEGORY ── */
.category { margin-bottom: 28px; }
.cat-title {
  font-size: 11px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--navy-mid);
  padding: 0 0 8px; margin-bottom: 0;
  display: flex; align-items: center; gap: 10px;
}
.cat-title::after {
  content: ''; flex: 1; height: 1.5px;
  background: linear-gradient(to right, var(--border), transparent);
}
.cat-title span {
  background: var(--orange); color: #fff;
  font-size: 9.5px; padding: 2px 8px; border-radius: 50px;
  font-weight: 700; letter-spacing: .06em;
}

/* ── TABLE ── */
.ptable {
  width: 100%; border-collapse: collapse;
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.ptable thead th {
  background: var(--navy);
  color: rgba(255,255,255,.55);
  font-size: 9.5px; font-weight: 700;
  letter-spacing: .09em; text-transform: uppercase;
  padding: 9px 14px; text-align: left;
}
.ptable thead th:last-child { text-align: right; }
.ptable tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
.ptable tbody tr:last-child { border-bottom: none; }
.ptable tbody tr:hover { background: var(--orange-bg); }
.ptable td { padding: 10px 14px; vertical-align: middle; }
.p-name { font-weight: 600; color: var(--navy); font-size: 13px; }
.p-desc { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; }
.p-code { font-size: 10.5px; color: var(--text-muted); font-family: monospace; }
.p-unit { color: var(--text-muted); font-size: 12px; }
.p-price {
  font-size: 15px; font-weight: 900; color: var(--navy);
  text-align: right; white-space: nowrap;
}
.p-price .rub { color: var(--orange); }
.p-price.no-price { color: var(--text-muted); font-size: 12px; font-weight: 400; }

/* ── FOOTER ── */
.footer {
  background: var(--navy);
  padding: 20px 32px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.footer-info { color: rgba(255,255,255,.5); font-size: 11.5px; }
.footer-info strong { color: rgba(255,255,255,.8); }
.footer-links { display: flex; gap: 16px; flex-wrap: wrap; }
.footer-link {
  color: rgba(255,255,255,.45); font-size: 11.5px;
  text-decoration: none; transition: color .15s;
  display: flex; align-items: center; gap: 5px;
}
.footer-link:hover { color: var(--orange); }

/* ── LOADING ── */
.loading {
  text-align: center; padding: 60px 20px;
  color: var(--text-muted); font-size: 14px;
}
.loading-dot {
  display: inline-block; width: 8px; height: 8px;
  background: var(--orange); border-radius: 50%;
  margin: 0 3px; animation: bounce .8s ease infinite;
}
.loading-dot:nth-child(2) { animation-delay: .15s; }
.loading-dot:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }

/* ── UPDATED ── */
.updated-bar {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 7px 32px; font-size: 11px; color: var(--text-muted);
  display: flex; align-items: center; gap: 8px;
}
.updated-bar svg { color: var(--orange); flex-shrink: 0; }

/* ── PRINT ── */
@media print {
  .header, .hero, .updated-bar, .footer { display: none !important; }
  body { background: #fff; }
  .content { padding: 0; max-width: 100%; }
  .ptable { box-shadow: none; border: 1px solid #ddd; }
  .category { break-inside: avoid; }
  .ptable tbody tr:hover { background: transparent; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div>
      <div class="logo-title">Fish to Business</div>
      <div class="logo-sub">рыба для бизнеса</div>
    </div>
  </div>
  <div class="header-right">
    <div class="header-contact" id="headerContact"></div>
    <button class="btn-pdf" onclick="savePDF()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Сохранить PDF
    </button>
  </div>
</header>

<div class="updated-bar" id="updatedBar" style="display:none">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
  <span id="updatedText"></span>
</div>

<div class="hero">
  <div class="hero-text" id="heroDesc"></div>
  <div class="hero-meta" id="heroMeta"></div>
</div>

<div class="content" id="content">
  <div class="loading">
    <div style="margin-bottom:14px">Загружаем прайс-лист</div>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
  </div>
</div>

<footer class="footer" id="footer" style="display:none">
  <div class="footer-info" id="footerInfo"></div>
  <div class="footer-links" id="footerLinks"></div>
</footer>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';

async function load() {
  try {
    const r = await fetch(`${API}/api/pricelist`);
    if (!r.ok) throw new Error();
    const data = await r.json();
    render(data);
  } catch {
    document.getElementById('content').innerHTML =
      '<div class="loading" style="color:#e53e3e">Не удалось загрузить прайс. Попробуйте обновить страницу.</div>';
  }
}

function fmt(price) {
  return Number(price).toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function render(data) {
  const c   = data.company || {};
  const cats = (data.categories || []).filter(cat => cat.products?.length);
  const total = cats.reduce((s, cat) => s + (cat.products?.length || 0), 0);

  // Header contact
  if (c.phone) {
    document.getElementById('headerContact').innerHTML =
      `<strong>${c.phone}</strong>${c.hours ? ' · ' + c.hours : ''}`;
  }

  // Hero
  if (c.heroDesc) document.getElementById('heroDesc').textContent = c.heroDesc;
  document.getElementById('heroMeta').innerHTML = `
    <div class="hero-stat"><div class="val">${cats.length}</div><div class="lbl">Категорий</div></div>
    <div class="hero-stat"><div class="val">${total}</div><div class="lbl">Позиций</div></div>
  `;

  // Updated bar
  const now = new Date();
  document.getElementById('updatedText').textContent =
    `Актуально на ${now.toLocaleDateString('ru-RU', {day:'numeric',month:'long',year:'numeric'})}`;
  document.getElementById('updatedBar').style.display = 'flex';

  // Categories
  const content = document.getElementById('content');
  if (!cats.length) {
    content.innerHTML = '<div class="loading">Прайс пока не заполнен</div>';
    return;
  }

  content.innerHTML = cats.map(cat => `
    <div class="category">
      <div class="cat-title">
        ${cat.name || 'Без названия'}
        <span>${cat.products.length} поз.</span>
      </div>
      <table class="ptable">
        <thead>
          <tr>
            <th style="width:40%">Наименование</th>
            <th>Описание</th>
            <th>Ед.</th>
            <th style="text-align:right">Цена, ₽</th>
          </tr>
        </thead>
        <tbody>
          ${cat.products.map(p => `
            <tr>
              <td>
                <div class="p-name">${p.name}</div>
                ${p.code ? `<div class="p-code">${p.code}</div>` : ''}
              </td>
              <td><div class="p-desc">${p.description || '—'}</div></td>
              <td><span class="p-unit">${p.unit || 'кг'}</span></td>
              <td>
                ${p.price != null && p.price > 0
                  ? `<div class="p-price">${fmt(p.price)} <span class="rub">₽</span></div>`
                  : `<div class="p-price no-price">по запросу</div>`
                }
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `).join('');

  // Footer
  if (c.address || c.phone || (data.links || []).length) {
    document.getElementById('footer').style.display = 'flex';
    const info = [];
    if (c.phone)   info.push(`<strong>${c.phone}</strong>`);
    if (c.address) info.push(c.address);
    document.getElementById('footerInfo').innerHTML = info.join(' · ');

    const links = (data.links || []).map(l => {
      const icons = {
        website:  '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>',
        order:    '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>',
        phone:    '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01.06 1.22 2 2 0 012.03 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/></svg>',
        whatsapp: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>',
      };
      return `<a class="footer-link" href="${l.url}" target="_blank">${icons[l.type]||''} ${l.label}</a>`;
    }).join('');
    document.getElementById('footerLinks').innerHTML = links;
  }
}

function savePDF() {
  window.print();
}

load();
</script>
</body>
</html>
